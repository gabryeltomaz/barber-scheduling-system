<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="icon" type="image/png" href="../assets main page/barbafavicon.png">

</head>
<body class="">

    <div class="min-h-screen flex bg-white justify-center items-center">
        
        <div class="w-full md:w-full flex flex-col items-center justify-center px-8">
            <div class="w-full max-w-md">
                <h1 class="text-4xl font-bold text-black mb-2">
                    Login
                </h1>
                <p class="text-gray-600 mb-8">
                    Entre com sua conta para continuar.
                </p>

                <form id="formulario" class="space-y-2">
                    <div>
                        <label class="block text-black font-medium mb-2">
                            E-mail
                        </label>
                        <input id="email" type="email" placeholder="seuemail@exemplo.com"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                        />
                    </div>

                    <div>
                        <label class="block text-black font-medium mb-2">
                            Senha
                        </label>
                        <input  id="senha"  type="password" placeholder="********" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black"
                        />
                    </div>

                    <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:opacity-90 transition">
                        Entrar
                    </button>
                </form>
            </div>
        </div>

    </div>

    <footer>
        
    </footer>





    <script src="jsdapaglogin.js"></script>
</body>


</html>
